<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - MHEnt. Cinema</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body class="gradient-bg">
    <nav class="navbar">
        <div class="nav-left">
            <a onclick="window.location.href='index.html'" style="cursor: pointer;">
                <img src="assets/avt-web.jpg" alt="Avatar Web" class="avt-img">
                <span class="logo-name">MHEnt. - Cinema</span>
            </a>
        </div>
        <ul class="nav-links">
            <li><a onclick="window.location.href='index.html'" style="cursor: pointer;">Trang chủ</a></li>
            <li><a onclick="window.location.href='index.html#phim-dang-chieu'" style="cursor: pointer;">Danh sách Phim</a></li>
            <li><a onclick="window.location.href='about.html'" style="cursor: pointer;">Về chúng tớ</a></li>
        </ul>
    </nav>

    <div class="login-page">
        <div class="login-box">
            <img src="assets/avt-web.jpg" alt="MHEnt Logo" style="width: 80px; border-radius: 50%; margin-bottom: 15px; border: 2px solid #ff85a2;">
            <h1>CỔNG ĐĂNG NHẬP</h1>
            <p>Kết nối để lưu trữ danh sách phim yêu thích của cậu trên MHEnt. Cinema!</p>
            
            <div class="auth-form">
                <input type="email" id="input-email" class="auth-input" placeholder="Nhập địa chỉ Email..." required>
                <input type="password" id="input-password" class="auth-input" placeholder="Nhập mật khẩu..." required>
                
                <button id="btn-login-email" class="btn-email-login">✉️ Đăng Nhập</button>
                <button id="btn-register-email" class="btn-email-register">Tạo tài khoản mới</button>
            </div>

            <div class="auth-divider">Hoặc</div>
            
            <button id="btn-login-google" class="btn-google">
                <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" alt="Google">
                Tiếp tục với Google
            </button>

            <p id="login-status" style="display: none; margin-top: 15px; font-weight: bold;"></p>
            
            <a href="index.html" class="back-home">⬅ Quay lại Trang chủ</a>
        </div>
    </div>

    <button id="btn-back-to-top" title="Lên đầu trang">⬆</button>
    
    <footer>
        <div class="footer-bottom">
            <p>©2026 Miyazaki Haruto Entertainment Co., Ltd.</p>
            <div class="footer-social">
                <a onclick="window.location.href='https://www.facebook.com/mharuto.entertainment/'" style="cursor: pointer;" target="_blank" class="footer-link">📘 Fanpage MHEnt.</a>
                <span class="footer-dot">•</span>
                <a onclick="window.location.href='https://www.facebook.com/groups/mhent.cinema'" style="cursor: pointer;" target="_blank" class="footer-link">🍿 Rạp phim Facebook</a>
            </div>
        </div>
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyASwAr10eyPVw7dqPG78UIVVFiixDe-Nfg",
            authDomain: "mhent-network.firebaseapp.com",
            projectId: "mhent-network",
            storageBucket: "mhent-network.firebasestorage.app",
            messagingSenderId: "57034885937",
            appId: "1:57034885937:web:6bd152b44a6f43c17d3e10"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        const statusText = document.getElementById('login-status');
        const emailInput = document.getElementById('input-email');
        const passInput = document.getElementById('input-password');

        function showStatus(msg, isError = false) {
            statusText.style.display = 'block';
            statusText.innerText = msg;
            statusText.style.color = isError ? '#e94560' : '#00ffcc';
        }

        // 1. Đăng nhập bằng Google
        document.getElementById('btn-login-google').addEventListener('click', async () => {
            showStatus('⏳ Đang kết nối với Google...');
            try {
                await signInWithPopup(auth, provider);
                showStatus('✅ Thành công! Đang đưa cậu về Rạp...');
                setTimeout(() => { window.location.href = 'index.html'; }, 1000);
            } catch (error) {
                console.error(error);
                showStatus('❌ Lỗi Google: Cậu kiểm tra lại mạng hoặc quyền truy cập nhé!', true);
            }
        });

        // 2. Đăng nhập bằng Email
        document.getElementById('btn-login-email').addEventListener('click', async () => {
            const email = emailInput.value.trim();
            const pass = passInput.value.trim();
            if(!email || !pass) return showStatus('❌ Cậu điền đầy đủ Email và Mật khẩu nhé!', true);
            
            showStatus('⏳ Đang kiểm tra thông tin...');
            try {
                await signInWithEmailAndPassword(auth, email, pass);
                showStatus('✅ Đăng nhập thành công!');
                setTimeout(() => { window.location.href = 'index.html'; }, 1000);
            } catch (error) {
                showStatus('❌ Sai email hoặc mật khẩu rùi!', true);
            }
        });

        // 3. Đăng ký tài khoản mới bằng Email
        document.getElementById('btn-register-email').addEventListener('click', async () => {
            const email = emailInput.value.trim();
            const pass = passInput.value.trim();
            if(!email || !pass) return showStatus('❌ Cậu điền Email và Mật khẩu muốn tạo nhé!', true);
            if(pass.length < 6) return showStatus('❌ Mật khẩu phải có ít nhất 6 ký tự nha!', true);
            
            showStatus('⏳ Đang tạo tài khoản mới...');
            try {
                await createUserWithEmailAndPassword(auth, email, pass);
                showStatus('🎉 Đăng ký thành công! Chào mừng cậu đến với MHEnt!');
                setTimeout(() => { window.location.href = 'index.html'; }, 1500);
            } catch (error) {
                if(error.code === 'auth/email-already-in-use') {
                    showStatus('❌ Email này đã được đăng ký rồi!', true);
                } else {
                    showStatus('❌ Lỗi tạo tài khoản, cậu thử lại nhé!', true);
                }
            }
        });
    </script>
</body>
</html>
