<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - MHEnt. Cinema</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body class="gradient-bg">

    <nav class="navbar">
        <div class="nav-left">
            <a onclick="window.location.href='index.html'" style="cursor: pointer;">
                <img src="assets/avt-web.jpg" alt="Avatar Web" class="avt-img">
                <span class="logo-name">MHEnt. - Cinema</span>
            </a>
        </div>

        <div class="menu-toggle" onclick="toggleMobileMenu()">☰</div>

        <ul class="nav-links" id="nav-links">
            <li><a onclick="window.location.href='index.html'" style="cursor: pointer;">Trang chủ</a></li>
            <li><a onclick="window.location.href='index.html#phim-dang-chieu'" style="cursor: pointer;">Danh sách Phim</a></li>
            <li><a onclick="window.location.href='about.html'" style="cursor: pointer;">Về chúng tớ</a></li>
        </ul>
    </nav>

    <div id="custom-popup" class="popup-overlay" style="display: none;">
        <div id="loading-overlay" class="loading-overlay" style="display: none;">
            <div class="spinner"></div>
            <h2 style="color: #ff85a2; margin-top: 20px; font-weight: 800; font-family: 'Nunito', sans-serif;">Đang mở cổng Google...</h2>
        </div>
        <div class="popup-box">
            <div class="popup-icon" id="popup-icon">✨</div>
            <h3 id="popup-title">Thành công!</h3>
            <p id="popup-message">Nội dung thông báo ở đây.</p>
        </div>
    </div>

    <div class="login-page">
        <div class="login-box">
            <img src="assets/avt-web.jpg" alt="MHEnt Logo" style="width: 80px; border-radius: 50%; margin-bottom: 15px; border: 2px solid #ff85a2;">
            <h1>KẾT NỐI VỚI MHEnt</h1>
            <p>Lưu trữ danh sách phim yêu thích của cậu!</p>
            
            <div class="auth-tabs">
                <button id="btn-tab-login" class="auth-tab-btn active" onclick="switchTab('login')">Đăng Nhập</button>
                <button id="btn-tab-register" class="auth-tab-btn" onclick="switchTab('register')">Đăng Ký</button>
            </div>

            <div id="tab-login" class="auth-content active">
                <div class="auth-form">
                    <input type="email" id="login-email" class="auth-input" placeholder="Địa chỉ Email..." required>
                    <input type="password" id="login-password" class="auth-input" placeholder="Mật khẩu..." required>
                    <button id="btn-login-email" class="btn-email-login">✉️ Vào Rạp</button>
                </div>
            </div>

            <div id="tab-register" class="auth-content">
                <div class="auth-form">
                    <input type="email" id="reg-email" class="auth-input" placeholder="Nhập Email mới..." required>
                    <input type="password" id="reg-password" class="auth-input" placeholder="Tạo mật khẩu (Tối thiểu 6 ký tự)..." required>
                    <input type="password" id="reg-confirm-password" class="auth-input" placeholder="Nhập lại mật khẩu..." required>
                    <button id="btn-register-email" class="btn-email-register">📝 Tạo Tài Khoản</button>
                </div>
            </div>

            <div class="auth-divider">Hoặc</div>
            
            <button id="btn-login-google" class="btn-google">
                <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" alt="Google">
                Tiếp tục với Google
            </button>
            
            <a href="index.html" class="back-home">⬅ Quay lại Trang chủ</a>
        </div>
    </div>

    <footer>
        <div class="footer-bottom">
            <p>©2026 Miyazaki Haruto Entertainment Co., Ltd.</p>
        </div>
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyASwAr10eyPVw7dqPG78UIVVFiixDe-Nfg",
            authDomain: "mhent-network.firebaseapp.com",
            projectId: "mhent-network",
            storageBucket: "mhent-network.firebasestorage.app",
            messagingSenderId: "57034885937",
            appId: "1:57034885937:web:6bd152b44a6f43c17d3e10"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        // Xử lý chuyển Tab
        window.switchTab = function(tabName) {
            document.querySelectorAll('.auth-tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.auth-content').forEach(content => content.classList.remove('active'));
            
            if(tabName === 'login') {
                document.getElementById('btn-tab-login').classList.add('active');
                document.getElementById('tab-login').classList.add('active');
            } else {
                document.getElementById('btn-tab-register').classList.add('active');
                document.getElementById('tab-register').classList.add('active');
            }
        };

        // HÀM GỌI POPUP
        window.showPopup = function(message, isError = false) {
            const popup = document.getElementById('custom-popup');
            const box = document.querySelector('.popup-box');
            const icon = document.getElementById('popup-icon');
            const title = document.getElementById('popup-title');
            const msg = document.getElementById('popup-message');

            if (isError) {
                box.classList.add('error'); icon.innerText = "❌"; title.innerText = "Lỗi rùi!";
            } else {
                box.classList.remove('error'); icon.innerText = "✨"; title.innerText = "Thành công!";
            }
            msg.innerText = message;
            popup.style.display = 'flex';

            if (!isError) {
                setTimeout(() => {
                    if (document.referrer && document.referrer.indexOf(window.location.hostname) !== -1) {
                        window.history.back(); 
                    } else {
                        window.location.href = 'index.html'; 
                    }
                }, 3000);
            } else {
                setTimeout(() => { popup.style.display = 'none'; }, 3000);
            }
        };

        // 1. Đăng nhập Google (Có màn hình chờ)
        document.getElementById('btn-login-google').addEventListener('click', async () => {
            const loadingScreen = document.getElementById('loading-overlay');
            
            // Hiện màn hình Loading che web lại
            loadingScreen.style.display = 'flex';
            
            try {
                // Tạm dừng ở đây chờ người dùng nhập mail trên bảng của Google
                await signInWithPopup(auth, provider);
                
                // Nhập xong thành công -> Tắt loading -> Bắn Popup
                loadingScreen.style.display = 'none';
                showPopup('Đang đưa cậu về Rạp...', false);
                
            } catch (error) { 
                // Có lỗi hoặc bấm Hủy -> Tắt loading -> Bắn Popup báo lỗi
                loadingScreen.style.display = 'none';
                showPopup('Mạng lỗi hoặc cậu đã hủy đăng nhập rùi!', true); 
            }
        });

        // 2. Đăng nhập Email
        // BẮT SỰ KIỆN NÚT ENTER CHO ĐĂNG NHẬP
        const loginEmailField = document.getElementById('login-email');
        const loginPassField = document.getElementById('login-password');
        const btnLoginClick = document.getElementById('btn-login-email');

        const pressEnterToLogin = (event) => {
            if (event.key === 'Enter') {
                event.preventDefault(); // Ngăn nó nhảy lung tung
                btnLoginClick.click(); // Giả lập cú click chuột vào nút "Vào Rạp"
            }
        };

        if (loginEmailField && loginPassField) {
            loginEmailField.addEventListener('keypress', pressEnterToLogin);
            loginPassField.addEventListener('keypress', pressEnterToLogin);
        }
        
        document.getElementById('btn-login-email').addEventListener('click', async () => {
            const email = document.getElementById('login-email').value.trim(); 
            const pass = document.getElementById('login-password').value.trim();
            if(!email || !pass) return showPopup('Điền đủ Email và Mật khẩu nhé!', true);
            try {
                await signInWithEmailAndPassword(auth, email, pass);
                showPopup('Đăng nhập hoàn tất!', false);
            } catch (error) { showPopup('Sai email hoặc mật khẩu rùi!', true); }
        });

        // 3. Đăng ký Email (Có xác nhận Mật khẩu)
        document.getElementById('btn-register-email').addEventListener('click', async () => {
            const email = document.getElementById('reg-email').value.trim(); 
            const pass = document.getElementById('reg-password').value.trim();
            const confirmPass = document.getElementById('reg-confirm-password').value.trim();

            if(!email || !pass || !confirmPass) return showPopup('Điền đủ thông tin nhé!', true);
            if(pass.length < 6) return showPopup('Mật khẩu ít nhất 6 ký tự nha!', true);
            if(pass !== confirmPass) return showPopup('Hai mật khẩu không khớp nhau rùi!', true);

            try {
                await createUserWithEmailAndPassword(auth, email, pass);
                showPopup('Tạo tài khoản thành công! Chào mừng cậu!', false);
            } catch (error) {
                if(error.code === 'auth/email-already-in-use') showPopup('Email này đã được đăng ký rồi!', true);
                else showPopup('Lỗi tạo tài khoản!', true);
            }
        });

        // HÀM BẬT/TẮT MENU TRÊN ĐIỆN THOẠI
            window.toggleMobileMenu = function() {
                const navLinks = document.getElementById('nav-links');
                if(navLinks) {
                    navLinks.classList.toggle('active');
                }
            };
    </script>
</body>
</html>
