<!DOCTYPE html>
<html lang="vi">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Đăng nhập - MHEnt. Cinema</title>
        <link rel="stylesheet" href="style.css">
        <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
        <style>
            /* 1. Phủ đen toàn bộ nền của trang web, không chừa khe hở nào */
            body { 
                background: #1a1a2e; 
                margin: 0; 
                display: flex; 
                flex-direction: column; 
                min-height: 100vh; 
                font-family: 'Nunito', sans-serif;
            }

            /* 2. Đẩy cái khung login ra giữa, chừa chỗ cho footer ở đáy */
            .login-page { 
                flex: 1; /* Tự động co giãn để đẩy footer xuống mút chỉ */
                display: flex; 
                justify-content: center; 
                align-items: center; 
                padding: 20px;
            }

            /* 3. Trang trí cái hộp đăng nhập */
            .login-box { 
                background: #16213e; 
                padding: 40px; 
                border-radius: 15px; 
                border: 2px solid #ff85a2; 
                text-align: center; 
                box-shadow: 0 0 20px rgba(255, 133, 162, 0.4); 
                max-width: 400px; 
                width: 100%; 
            }
            .login-box h1 { color: #ff85a2; margin-bottom: 10px; }
            .login-box p { color: #ccc; margin-bottom: 30px; line-height: 1.5; }
            
            .btn-google { 
                background: white; color: #333; font-weight: bold; font-family: 'Nunito', sans-serif; 
                font-size: 16px; border: none; padding: 12px 20px; border-radius: 25px; 
                cursor: pointer; display: flex; align-items: center; justify-content: center; 
                gap: 10px; width: 100%; transition: 0.3s; 
            }
            .btn-google:hover { transform: scale(1.05); box-shadow: 0 5px 15px rgba(255, 255, 255, 0.2); }
            .btn-google img { width: 24px; }
            
            .back-home { display: block; margin-top: 25px; color: #ff85a2; text-decoration: none; font-size: 15px; font-weight: bold; }
            .back-home:hover { text-decoration: underline; }

            /* 4. Ép màu cho cái Footer (nếu cậu có dán footer vào trang này) */
            footer {
                background: #16213e; /* Tiệp màu với hộp login */
                color: #ccc;
                text-align: center;
                padding: 15px;
                border-top: 1px solid #ff85a2;
            }
            .footer-link { color: #ff85a2; text-decoration: none; font-weight: bold; }
            .footer-link:hover { text-decoration: underline; }
        </style>
    </head>
    <body>
        <nav class="navbar">
            <div class="nav-left">
                <a onclick="window.location.href='index.html'" style="cursor: pointer;">
                    <img src="assets/avt-web.jpg" alt="Avatar Web" class="avt-img">
                    <span class="logo-name">MHEnt. - Cinema</span>
                </a>
            </div>
            <ul class="nav-links">
                <li><a onclick="window.location.href='index.html'" style="cursor: pointer;">Trang chủ</a></li>
                <li><a onclick="window.location.href='index.html#phim-dang-chieu'" style="cursor: pointer;">Danh sách Phim</a></li>
                <li><a onclick="window.location.href='about.html'" style="cursor: pointer;">Về chúng tớ</a></li>
                
                <li class="user-section">
                    <button id="btn-login" class="btn-login">
                        <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" alt="Google" style="width: 15px;">
                        Đăng nhập
                    </button>

                    <div id="user-profile" class="user-profile">
                        <img id="user-avatar" src="" alt="User" class="user-avatar">
                        <span id="user-name" class="user-name">Tên User</span>
                        <button id="btn-logout" class="btn-logout">Thoát</button>
                    </div>
                </li>
            </ul>
        </nav>

        <div class="login-page">
            <div class="login-box">
                <img src="assets/avt-web.jpg" alt="MHEnt Logo" style="width: 80px; border-radius: 50%; margin-bottom: 15px; border: 2px solid #ff85a2;">
                <h1>CỔNG ĐĂNG NHẬP</h1>
                <p>Kết nối để lưu trữ danh sách phim yêu thích của cậu trên MHEnt. Cinema!</p>
                
                <button id="btn-login-google" class="btn-google">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" alt="Google">
                    Đăng nhập bằng Google
                </button>

                <p id="login-status" style="color: #00ffcc; display: none; margin-top: 15px; font-weight: bold;">⏳ Đang xác thực...</p>
                
                <a href="index.html" class="back-home">⬅ Quay lại Trang chủ</a>
            </div>
        </div>

        <button id="btn-back-to-top" title="Lên đầu trang">⬆</button>
        
        <footer>
            <div class="footer-bottom">
                <p>©2026 Miyazaki Haruto Entertainment Co., Ltd.</p>
                <div class="footer-social">
                    <a onclick="window.location.href='https://www.facebook.com/mharuto.entertainment/'" style="cursor: pointer;" target="_blank" class="footer-link">📘 Fanpage MHEnt.</a>
                    <span class="footer-dot">•</span>
                    <a onclick="window.location.href='https://www.facebook.com/groups/mhent.cinema'" style="cursor: pointer;" target="_blank" class="footer-link">🍿 Rạp phim Facebook</a>
                </div>
            </div>
        </footer>

        <script type="module">
            import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
            import { getAuth, signInWithPopup, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

            const firebaseConfig = {
                apiKey: "AIzaSyAticyRN5vynyWshwGZUn6u6Oj-JfR9Vds",
                authDomain: "mhent-cinema.firebaseapp.com",
                projectId: "mhent-cinema",
                storageBucket: "mhent-cinema.firebasestorage.app",
                messagingSenderId: "603929989829",
                appId: "1:603929989829:web:98eac7f48e7ad6fc4e96ac"
            };

            const app = initializeApp(firebaseConfig);
            const auth = getAuth(app);
            const provider = new GoogleAuthProvider();

            document.getElementById('btn-login-google').addEventListener('click', async () => {
                const statusText = document.getElementById('login-status');
                statusText.style.display = 'block';
                statusText.innerText = '⏳ Đang kết nối với Google...';
                statusText.style.color = '#00ffcc';

                try {
                    // Mở bảng đăng nhập Google
                    await signInWithPopup(auth, provider);
                    statusText.innerText = '✅ Thành công! Đang đưa cậu về Rạp...';
                    
                    // Đăng nhập thành công thì đá user về trang chủ
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 1000);

                } catch (error) {
                    console.error("Lỗi:", error);
                    statusText.innerText = '❌ Có lỗi xảy ra. Cậu thử lại nhé!';
                    statusText.style.color = '#ff4d4d';
                }
            });
        </script>
    </body>
</html>
